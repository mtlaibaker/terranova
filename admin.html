<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terra Nova — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #1e3a5f; --navy-lt: #2c5282; --orange: #f26522;
      --green: #2d9c5e; --red: #e53e3e;
      --bg: #f0f4f8; --surface: #fff; --border: #e2e8f0;
      --text: #1a202c; --muted: #718096;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Login ── */
    #loginScreen {
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: 20px;
    }
    #loginScreen img { height: 80px; width: auto; }
    #loginScreen h1 { font-size: 1.4rem; color: var(--navy); }
    .login-box {
      background: var(--surface); border-radius: 10px;
      padding: 32px 40px; box-shadow: 0 4px 20px rgba(0,0,0,.1);
      width: 340px; display: flex; flex-direction: column; gap: 14px;
    }
    .login-box label { font-size: .85rem; font-weight: 600; color: var(--muted); }
    .login-box input {
      padding: 10px 14px; border: 1px solid var(--border); border-radius: 6px;
      font-size: 1rem; outline: none; width: 100%;
    }
    .login-box input:focus { border-color: var(--navy); }
    .btn-login {
      background: var(--navy); color: #fff; border: none; border-radius: 6px;
      padding: 11px; font-size: .95rem; font-weight: 700; cursor: pointer;
      transition: background .12s;
    }
    .btn-login:hover { background: var(--navy-lt); }
    .login-error { color: var(--red); font-size: .83rem; text-align: center; display: none; }

    /* ── Admin header ── */
    .admin-header {
      background: var(--navy); color: #fff; padding: 14px 28px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .admin-header-left { display: flex; align-items: center; gap: 14px; }
    .admin-header img { height: 44px; width: auto; filter: brightness(0) invert(1); }
    .admin-header h1 { font-size: 1.05rem; font-weight: 600; }
    .admin-header-sub { font-size: .78rem; color: rgba(255,255,255,.6); }
    .btn-logout {
      background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.22);
      color: rgba(255,255,255,.85); border-radius: 4px; padding: 5px 14px;
      font-size: .8rem; cursor: pointer; transition: background .12s;
    }
    .btn-logout:hover { background: rgba(255,255,255,.22); }

    /* ── Admin body ── */
    #adminContent { display: none; }
    .admin-body { max-width: 1200px; margin: 28px auto; padding: 0 24px 60px; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px; flex-wrap: wrap; gap: 12px;
    }
    .toolbar h2 { font-size: 1.05rem; font-weight: 600; color: var(--navy); }
    .toolbar-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn { border-radius: 6px; padding: 9px 18px; font-size: .875rem;
           font-weight: 600; cursor: pointer; border: none; transition: background .12s; }
    .btn-primary { background: var(--navy); color: #fff; }
    .btn-primary:hover { background: var(--navy-lt); }
    .btn-success { background: var(--green); color: #fff; }
    .btn-success:hover { background: #237a4a; }
    .btn-secondary { background: var(--surface); color: var(--text);
                     border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--bg); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { background: #c53030; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; right: 28px;
      background: var(--text); color: #fff;
      padding: 12px 20px; border-radius: 8px; font-size: .875rem;
      box-shadow: 0 4px 16px rgba(0,0,0,.2); opacity: 0;
      transition: opacity .3s; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; }
    .toast.success { background: var(--green); }
    .toast.error   { background: var(--red); }

    /* ── Product table ── */
    .table-wrap {
      background: var(--surface); border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.1); overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    thead th {
      background: var(--navy); color: rgba(255,255,255,.88);
      padding: 10px 12px; text-align: left;
      font-size: .71rem; text-transform: uppercase; letter-spacing: .06em;
      white-space: nowrap;
    }
    thead th:first-child { border-radius: 8px 0 0 0; width: 70px; }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f7f9fc; }
    td { padding: 10px 12px; vertical-align: middle; }
    td input, td select {
      width: 100%; padding: 6px 8px; border: 1px solid var(--border);
      border-radius: 4px; font-size: .83rem; color: var(--text);
      background: var(--bg); outline: none; font-family: inherit;
    }
    td input:focus, td select:focus { border-color: var(--navy); background: #fff; }
    td input[type="number"] { width: 80px; }
    .col-img img { width: 52px; height: 52px; object-fit: contain;
                   border-radius: 6px; background: #f8f8f8; display: block; }
    .col-img input { margin-top: 4px; font-size: .72rem; }
    .col-del { width: 44px; text-align: center; }
    .btn-del {
      background: none; border: none; color: #cbd5e0; font-size: 1.2rem;
      cursor: pointer; padding: 4px; line-height: 1; transition: color .12s;
    }
    .btn-del:hover { color: var(--red); }

    /* ── Status bar ── */
    .status-bar {
      margin-top: 16px; padding: 10px 16px; border-radius: 6px;
      font-size: .83rem; display: none;
    }
    .status-bar.loading { background: #ebf4ff; color: #2b6cb0; display: block; }
    .status-bar.success { background: #e8f8ef; color: var(--green); display: block; }
    .status-bar.error   { background: #fff5f5; color: var(--red);   display: block; }
  </style>
</head>
<body>

  <!-- ── Login screen ── -->
  <div id="loginScreen">
    <img src="images/image1.png" alt="Terra Nova" />
    <h1>Terra Nova Admin</h1>
    <div class="login-box">
      <label for="pwInput">Password</label>
      <input type="password" id="pwInput" placeholder="Enter password"
             onkeydown="if(event.key==='Enter') login()" autofocus />
      <button class="btn-login" onclick="login()">Sign In</button>
      <p class="login-error" id="loginError">Incorrect password. Please try again.</p>
    </div>
  </div>

  <!-- ── Admin content ── -->
  <div id="adminContent">

    <header class="admin-header">
      <div class="admin-header-left">
        <img src="images/image1.png" alt="Terra Nova" />
        <div>
          <h1>Product Inventory</h1>
          <div class="admin-header-sub">Changes saved here update the live order form</div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </header>

    <div class="admin-body">

      <div class="toolbar">
        <h2>Products</h2>
        <div class="toolbar-actions">
          <button class="btn btn-secondary" onclick="loadProducts()">&#8635; Refresh from Sheet</button>
          <button class="btn btn-primary"   onclick="addRow()">+ Add Product</button>
          <button class="btn btn-success"   onclick="saveProducts()">&#10003; Save to Sheet</button>
        </div>
      </div>

      <div class="status-bar" id="statusBar"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Barcode</th>
              <th>SKU</th>
              <th>SRP / unit</th>
              <th>Wholesale / unit</th>
              <th>Order Unit</th>
              <th>Units / Order</th>
              <th>Unit Label</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="productBody"></tbody>
        </table>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const WEBHOOK = 'https://script.google.com/macros/s/AKfycbyLHoKCqkTmzZgpHmwrRhB6fggm8Ua6py7_H5nY6qpyD9AzcMxTqdpD_Pb4iWb4TD1t/exec';
    const PASSWORD = 'pickleball2026';
    const SESSION_KEY = 'tn_admin_auth';

    // Default products (used as seed data if sheet is empty)
    const DEFAULTS = [
      { id:1, name:'Bacon Socks',                    barcode:'644197322967', sku:'687 0362', srp:15.99, wholesale:11.90, img:'images/image2.png',  orderUnit:'display', unitsPerOrder:6, unitLabel:'pairs' },
      { id:2, name:'Ramen Instant Socks',             barcode:'644197322967', sku:'687 0362', srp:15.99, wholesale:11.90, img:'images/image3.png',  orderUnit:'display', unitsPerOrder:6, unitLabel:'pairs' },
      { id:3, name:'Beef Jerky Socks',                barcode:'644197322967', sku:'687 0362', srp:15.99, wholesale:11.90, img:'images/image4.png',  orderUnit:'display', unitsPerOrder:6, unitLabel:'pairs' },
      { id:4, name:'Greatest Hits Vinyl Record Socks',barcode:'644197322967', sku:'687 0362', srp:15.99, wholesale:11.90, img:'images/image7.png',  orderUnit:'display', unitsPerOrder:6, unitLabel:'pairs' },
      { id:5, name:'Burger Socks',                    barcode:'644197322967', sku:'687 0362', srp:15.99, wholesale:11.90, img:'images/image8.png',  orderUnit:'display', unitsPerOrder:6, unitLabel:'pairs' },
      { id:6, name:'Pickles Socks',                   barcode:'644197322967', sku:'687 0362', srp:15.99, wholesale:11.90, img:'images/image9.png',  orderUnit:'display', unitsPerOrder:6, unitLabel:'pairs' },
      { id:7, name:'Socks With Hops',                 barcode:'644197322967', sku:'687 0362', srp:15.99, wholesale:11.90, img:'images/image11.png', orderUnit:'display', unitsPerOrder:6, unitLabel:'pairs' },
    ];

    /* ── Auth ── */
    function login() {
      if (document.getElementById('pwInput').value === PASSWORD) {
        sessionStorage.setItem(SESSION_KEY, '1');
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminContent').style.display = 'block';
        loadProducts();
      } else {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('pwInput').value = '';
        document.getElementById('pwInput').focus();
      }
    }

    function logout() {
      sessionStorage.removeItem(SESSION_KEY);
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('adminContent').style.display = 'none';
      document.getElementById('pwInput').value = '';
    }

    // Auto-login if session exists
    if (sessionStorage.getItem(SESSION_KEY)) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminContent').style.display = 'block';
      loadProducts();
    }

    /* ── Load products from sheet ── */
    async function loadProducts() {
      setStatus('loading', 'Loading products from sheet…');
      try {
        const res  = await fetch(`${WEBHOOK}?action=getProducts`);
        const data = await res.json();
        const products = (Array.isArray(data) && data.length > 0) ? data : DEFAULTS;
        renderTable(products.map(p => ({
          ...p,
          srp:           Number(p.srp),
          wholesale:     Number(p.wholesale),
          unitsPerOrder: Number(p.unitsPerOrder),
        })));
        setStatus('success', data.length > 0
          ? `Loaded ${data.length} products from sheet.`
          : 'Sheet is empty — showing defaults. Save to populate the sheet.');
      } catch (err) {
        renderTable(DEFAULTS);
        setStatus('error', 'Could not reach sheet — showing defaults. ' + err.message);
      }
    }

    /* ── Render editable table ── */
    function renderTable(products) {
      const tbody = document.getElementById('productBody');
      tbody.innerHTML = '';
      products.forEach((p, i) => tbody.appendChild(makeRow(p, i)));
    }

    function makeRow(p, idx) {
      const tr = document.createElement('tr');
      tr.dataset.idx = idx;
      tr.innerHTML = `
        <td class="col-img">
          <img src="${p.img}" alt="" onerror="this.src='images/image1.png'" />
          <input type="text" class="f-img" value="${p.img}" placeholder="images/imageX.png"
                 oninput="this.closest('tr').querySelector('img').src=this.value" />
        </td>
        <td><input type="text"   class="f-name"          value="${p.name}"          /></td>
        <td><input type="text"   class="f-barcode"       value="${p.barcode}"       /></td>
        <td><input type="text"   class="f-sku"           value="${p.sku}"           /></td>
        <td><input type="number" class="f-srp"           value="${p.srp}"           step="0.01" min="0" /></td>
        <td><input type="number" class="f-wholesale"     value="${p.wholesale}"     step="0.01" min="0" /></td>
        <td>
          <select class="f-orderUnit">
            ${['display','case','pack','box','unit'].map(u =>
              `<option${p.orderUnit===u?' selected':''}>${u}</option>`
            ).join('')}
          </select>
        </td>
        <td><input type="number" class="f-unitsPerOrder" value="${p.unitsPerOrder}" min="1" step="1" /></td>
        <td><input type="text"   class="f-unitLabel"     value="${p.unitLabel}"     /></td>
        <td class="col-del">
          <button class="btn-del" title="Remove" onclick="this.closest('tr').remove()">&#215;</button>
        </td>
      `;
      return tr;
    }

    /* ── Add blank row ── */
    let nextId = 100;
    function addRow() {
      const tbody = document.getElementById('productBody');
      const idx   = tbody.rows.length;
      const blank = { id: nextId++, name:'', barcode:'644197322967', sku:'687 0362',
                      srp:15.99, wholesale:11.90, img:'images/image1.png',
                      orderUnit:'display', unitsPerOrder:6, unitLabel:'pairs' };
      tbody.appendChild(makeRow(blank, idx));
    }

    /* ── Collect table data ── */
    function collectRows() {
      return Array.from(document.querySelectorAll('#productBody tr')).map((tr, i) => ({
        id:            i + 1,
        name:          tr.querySelector('.f-name').value.trim(),
        barcode:       tr.querySelector('.f-barcode').value.trim(),
        sku:           tr.querySelector('.f-sku').value.trim(),
        srp:           parseFloat(tr.querySelector('.f-srp').value) || 0,
        wholesale:     parseFloat(tr.querySelector('.f-wholesale').value) || 0,
        img:           tr.querySelector('.f-img').value.trim(),
        orderUnit:     tr.querySelector('.f-orderUnit').value,
        unitsPerOrder: parseInt(tr.querySelector('.f-unitsPerOrder').value) || 1,
        unitLabel:     tr.querySelector('.f-unitLabel').value.trim(),
      })).filter(p => p.name);
    }

    /* ── Save products to sheet ── */
    async function saveProducts() {
      const products = collectRows();
      if (!products.length) { toast('No products to save.', 'error'); return; }

      setStatus('loading', 'Saving to sheet…');
      try {
        const url = `${WEBHOOK}?action=saveProducts&payload=${encodeURIComponent(JSON.stringify(products))}`;
        const res  = await fetch(url);
        const data = await res.json();
        if (data.status === 'ok') {
          setStatus('success', `✓ ${data.saved} products saved to sheet.`);
          toast('Products saved!', 'success');
        } else {
          throw new Error(data.message || 'Unknown error');
        }
      } catch (err) {
        setStatus('error', 'Save failed: ' + err.message);
        toast('Save failed.', 'error');
      }
    }

    /* ── UI helpers ── */
    function setStatus(type, msg) {
      const el = document.getElementById('statusBar');
      el.className = 'status-bar ' + type;
      el.textContent = msg;
    }

    let toastTimer;
    function toast(msg, type) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast show' + (type ? ' ' + type : '');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { el.className = 'toast'; }, 3000);
    }
  </script>

</body>
</html>
